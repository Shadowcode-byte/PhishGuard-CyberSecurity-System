version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: phishguard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: phishguard
      POSTGRES_USER: phishguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phishguard_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phishguard_net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: phishguard_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - phishguard_net

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishguard_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://phishguard:${POSTGRES_PASSWORD:-phishguard_pass}@postgres:5432/phishguard
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_in_production_32chars}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production_32chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # FIX: ADMIN_EMAIL must be set so the admin gate in auth.py works.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@phishguard.io}
      DEBUG: "false"
      ALLOWED_ORIGINS: '["http://localhost:3000","https://${DOMAIN:-localhost}"]'
    volumes:
      - file_uploads:/app/uploads
      - model_cache:/app/model.pkl
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - phishguard_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: phishguard_frontend
    restart: unless-stopped
    environment:
      # FIX: Do NOT set NEXT_PUBLIC_API_URL to "/api/v1" — api.ts appends
      # "/api/v1" itself, which would produce "/api/v1/api/v1/..." double path.
      # Leave it empty so api.ts uses the relative "/api/v1" base URL, and
      # nginx proxies /api/v1/* → backend:8000/api/v1/*.
      # For external Railway/Vercel deployments, set this to the full backend
      # base URL WITHOUT the /api/v1 suffix, e.g.:
      # NEXT_PUBLIC_API_URL: https://phishguard-production-0e6b.up.railway.app
      NEXT_PUBLIC_API_URL: ""
      # Internal URL used by Next.js server-side rewrites (not sent to browser)
      BACKEND_INTERNAL_URL: "http://backend:8000"
    depends_on:
      - backend
    networks:
      - phishguard_net

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: phishguard_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - phishguard_net

volumes:
  postgres_data:
  redis_data:
  file_uploads:
  model_cache:
  nginx_logs:

networks:
  phishguard_net:
    driver: bridge
